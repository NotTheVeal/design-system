name: Design System Audit Report

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    branches: [main]
    paths:
      - 'tokens/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Generate Audit Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Gather pipeline stats
        id: stats
        run: |
          echo "DATE=$(date -u '+%B %-d, %Y')" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
          COMPONENT_COUNT=$(find src/components -name '*.tsx' ! -name '*.stories.tsx' ! -name '*.test.tsx' 2>/dev/null | wc -l | tr -d ' ')
          echo "COMPONENT_COUNT=$COMPONENT_COUNT" >> $GITHUB_OUTPUT
          STORY_COUNT=$(find src/components -name '*.stories.tsx' 2>/dev/null | wc -l | tr -d ' ')
          echo "STORY_COUNT=$STORY_COUNT" >> $GITHUB_OUTPUT
          TOKEN_COUNT=$(find tokens -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "TOKEN_COUNT=$TOKEN_COUNT" >> $GITHUB_OUTPUT
          WORKFLOW_COUNT=$(find .github/workflows -name '*.yml' 2>/dev/null | wc -l | tr -d ' ')
          echo "WORKFLOW_COUNT=$WORKFLOW_COUNT" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '^tokens/' | tr '\n' ',' | sed 's/,$//' || echo "")
            echo "TRIGGER=Figma token push" >> $GITHUB_OUTPUT
            echo "CHANGED_FILES=$CHANGED" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "TRIGGER=Weekly scheduled audit" >> $GITHUB_OUTPUT
            echo "CHANGED_FILES=" >> $GITHUB_OUTPUT
          else
            echo "TRIGGER=Manual run" >> $GITHUB_OUTPUT
            echo "CHANGED_FILES=" >> $GITHUB_OUTPUT
          fi

      - name: Generate HTML audit report
        run: |
          mkdir -p docs/audit
          DATE="${{ steps.stats.outputs.DATE }}"
          COMMIT="${{ steps.stats.outputs.COMMIT }}"
          BRANCH="${{ steps.stats.outputs.BRANCH }}"
          TRIGGER="${{ steps.stats.outputs.TRIGGER }}"
          COMPONENTS="${{ steps.stats.outputs.COMPONENT_COUNT }}"
          STORIES="${{ steps.stats.outputs.STORY_COUNT }}"
          TOKENS="${{ steps.stats.outputs.TOKEN_COUNT }}"
          WORKFLOWS="${{ steps.stats.outputs.WORKFLOW_COUNT }}"
          CHANGED="${{ steps.stats.outputs.CHANGED_FILES }}"

          python3 - <<PYEOF
          import datetime

          date = "$DATE"
          commit = "$COMMIT"
          branch = "$BRANCH"
          trigger = "$TRIGGER"
          components = "$COMPONENTS"
          stories = "$STORIES"
          tokens = "$TOKENS"
          workflows = "$WORKFLOWS"
          changed = "$CHANGED"

          changed_html = f'<br><strong>Changed token files:</strong> <code>{changed}</code>' if changed else ''

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>PS Design System Audit</title>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap');
            :root {{ --blue:#005BA6; --midnight:#002F48; --border:#DCDCDC; --bg:#FAFAFA; }}
            * {{ box-sizing:border-box; margin:0; padding:0; }}
            body {{ font-family:'Source Sans Pro',sans-serif; background:var(--bg); color:#4A4A4A; font-size:14px; line-height:1.5; }}
            .header {{ background:var(--midnight); color:white; padding:28px 48px; border-bottom:4px solid var(--blue); }}
            .header h1 {{ font-size:24px; font-weight:300; margin-bottom:4px; }}
            .header .meta {{ font-size:12px; color:rgba(255,255,255,0.6); }}
            .body {{ max-width:1000px; margin:0 auto; padding:28px 24px 60px; }}
            .grid {{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin:20px 0; }}
            .card {{ background:white; border:1px solid var(--border); border-radius:4px; padding:14px; text-align:center; }}
            .card .n {{ font-size:28px; font-weight:700; color:var(--blue); }}
            .card .l {{ font-size:11px; color:#777; text-transform:uppercase; font-weight:700; letter-spacing:0.4px; }}
            table {{ width:100%; border-collapse:collapse; background:white; border:1px solid var(--border); border-radius:4px; margin:12px 0; font-size:13px; }}
            th {{ padding:8px 12px; background:#F1F1F1; text-align:left; font-size:11px; font-weight:700; color:#777; text-transform:uppercase; letter-spacing:0.3px; border-bottom:1px solid var(--border); }}
            td {{ padding:9px 12px; border-bottom:1px solid #F1F1F1; }}
            tr:last-child td {{ border-bottom:none; }}
            .badge {{ display:inline-block; padding:2px 7px; border-radius:3px; font-size:11px; font-weight:700; }}
            .pass {{ background:#E2F5EE; color:#0E7C55; border:1px solid #b2e4d3; }}
            .warn {{ background:#FFF4D0; color:#9C6B00; border:1px solid #f0d080; }}
            .manual {{ background:#FEF0FF; color:#7C00A0; border:1px solid #E0B0F0; }}
            .section-title {{ font-size:16px; font-weight:700; color:var(--midnight); border-bottom:2px solid var(--border); padding-bottom:8px; margin:28px 0 14px; }}
            .trigger-box {{ background:#EFF9FE; border:1px solid #a0c8e8; border-radius:4px; padding:12px 16px; margin-bottom:20px; font-size:13px; color:#003F70; }}
            code {{ font-family:monospace; font-size:11px; background:#F1F1F1; padding:1px 4px; border-radius:2px; }}
            .footer {{ text-align:center; font-size:11px; color:#949494; margin-top:40px; padding-top:14px; border-top:1px solid var(--border); }}
          </style>
          </head>
          <body>
          <div class="header">
            <h1>PartsSource Design System - Audit Report</h1>
            <div class="meta">{date} - {commit} - {branch} - {trigger}</div>
          </div>
          <div class="body">
            <div class="trigger-box"><strong>Trigger:</strong> {trigger}{changed_html}</div>
            <div class="grid">
              <div class="card"><div class="n">{components}</div><div class="l">Components</div></div>
              <div class="card"><div class="n">{stories}</div><div class="l">Stories</div></div>
              <div class="card"><div class="n">{tokens}</div><div class="l">Token Files</div></div>
              <div class="card"><div class="n">{workflows}</div><div class="l">Workflows</div></div>
            </div>
            <div class="section-title">Pipeline Status</div>
            <table>
              <thead><tr><th>Workflow</th><th>Status</th><th>Slack Alert</th></tr></thead>
              <tbody>
                <tr><td>Chromatic Visual Tests</td><td><span class="badge pass">Active</span></td><td><span class="badge pass">Wired</span></td></tr>
                <tr><td>Build Design Tokens</td><td><span class="badge pass">Active</span></td><td><span class="badge pass">Wired</span></td></tr>
                <tr><td>Design System CI</td><td><span class="badge pass">Active</span></td><td><span class="badge pass">Wired</span></td></tr>
                <tr><td>Generate Component</td><td><span class="badge pass">Active</span></td><td><span class="badge pass">Wired</span></td></tr>
                <tr><td>Publish to npm</td><td><span class="badge pass">Ready</span></td><td><span class="badge pass">Wired</span></td></tr>
                <tr><td>Token Drift Monitor</td><td><span class="badge pass">Monthly</span></td><td><span class="badge pass">Wired</span></td></tr>
                <tr><td>Audit Report</td><td><span class="badge pass">Weekly + Figma Push</span></td><td><span class="badge pass">Wired</span></td></tr>
              </tbody>
            </table>
            <div class="section-title">Gap Tracker</div>
            <table>
              <thead><tr><th>Gap</th><th>Status</th><th>Owner Action</th></tr></thead>
              <tbody>
                <tr><td>Token pipeline (Figma to JSON to CSS)</td><td><span class="badge pass">Resolved</span></td><td>-</td></tr>
                <tr><td>57-component Storybook library</td><td><span class="badge pass">Resolved</span></td><td>-</td></tr>
                <tr><td>Chromatic visual regression CI</td><td><span class="badge pass">Resolved</span></td><td>-</td></tr>
                <tr><td>Node.js 24 upgrade (all workflows)</td><td><span class="badge pass">Resolved</span></td><td>-</td></tr>
                <tr><td>Slack notifications (all 7 workflows)</td><td><span class="badge warn">Needs Secret</span></td><td>Add SLACK_WEBHOOK_URL to repo secrets</td></tr>
                <tr><td>npm publish pipeline</td><td><span class="badge warn">Needs Secret</span></td><td>Add NPM_TOKEN to repo secrets</td></tr>
                <tr><td>Figma Token Studio GitHub auto-sync</td><td><span class="badge manual">Manual Setup</span></td><td>Configure Token Studio plugin in Figma (one-time, 5 min)</td></tr>
              </tbody>
            </table>
            <div class="footer">Auto-generated by audit-report.yml - PartsSource Design System - rveal@partssource.com</div>
          </div>
          </body>
          </html>"""

          with open('docs/audit/index.html', 'w') as f:
              f.write(html)
          print("Report written.")
          PYEOF

      - name: Commit audit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/audit/index.html
          git diff --cached --quiet && echo "No changes" || git commit -m "chore(audit): audit report - ${{ steps.stats.outputs.DATE }} [${{ steps.stats.outputs.TRIGGER }}]"
          git push origin main

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-system-audit-${{ steps.stats.outputs.DATE }}
          path: docs/audit/index.html
          retention-days: 90

      - name: Write step summary
        run: |
          echo "## Design System Audit - ${{ steps.stats.outputs.DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ steps.stats.outputs.TRIGGER }}" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Components | ${{ steps.stats.outputs.COMPONENT_COUNT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stories | ${{ steps.stats.outputs.STORY_COUNT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Token Files | ${{ steps.stats.outputs.TOKEN_COUNT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflows | ${{ steps.stats.outputs.WORKFLOW_COUNT }} |" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify on failure
    needs: [audit]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Slack alert
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *${{ github.workflow }}* failed on `${{ github.ref_name }}`",
              "attachments": [{"color": "danger", "fields": [
                {"title": "Trigger", "value": "${{ github.event_name }}", "short": true},
                {"title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>", "short": true}
              ]}]
            }
