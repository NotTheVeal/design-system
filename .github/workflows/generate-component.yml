name: Generate Component

on:
  workflow_dispatch:
    inputs:
      component_name:
        description: 'Component name in PascalCase (e.g. StatusBadge)'
        required: true
        type: string
      branch:
        description: 'Branch to commit generated files to'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  generate:
    name: Generate ${{ inputs.component_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate component name
        run: |
          NAME="${{ inputs.component_name }}"
          if [[ ! "$NAME" =~ ^[A-Z][a-zA-Z0-9]+$ ]]; then
            echo "❌ Invalid component name '$NAME'. Must be PascalCase (e.g. StatusBadge)."
            exit 1
          fi
          echo "✅ Component name is valid: $NAME"

      - name: Check if component already exists
        id: check
        run: |
          COMPONENT="${{ inputs.component_name }}"
          FILE="src/components/${COMPONENT}/${COMPONENT}.tsx"
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Component already exists at $FILE — skipping generation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ No existing component found. Proceeding with generation."
          fi

      - name: Generate component
        if: steps.check.outputs.exists == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-component.js "${{ inputs.component_name }}"

      - name: Verify generated files
        if: steps.check.outputs.exists == 'false'
        run: |
          COMPONENT="${{ inputs.component_name }}"
          TSX="src/components/${COMPONENT}/${COMPONENT}.tsx"
          TEST="src/components/${COMPONENT}/${COMPONENT}.test.tsx"
          if [ ! -f "$TSX" ]; then
            echo "❌ Component file not found: $TSX"
            exit 1
          fi
          if [ ! -f "$TEST" ]; then
            echo "❌ Test file not found: $TEST"
            exit 1
          fi
          echo "✅ Generated files:"
          echo "  • $TSX ($(wc -l < $TSX) lines)"
          echo "  • $TEST ($(wc -l < $TEST) lines)"

      - name: Commit and push
        if: steps.check.outputs.exists == 'false'
        run: |
          COMPONENT="${{ inputs.component_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "src/components/${COMPONENT}/"
          git commit -m "feat(${COMPONENT}): auto-generate component + test via workflow_dispatch

          Generated by: generate-component.yml
          Triggered by: ${{ github.actor }}
          Component: ${{ inputs.component_name }}"
          git push origin "${{ inputs.branch }}"

      - name: Write job summary
        if: always()
        run: |
          COMPONENT="${{ inputs.component_name }}"
          echo "## Component Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            echo "⚠️ **Skipped** — `${COMPONENT}` already exists." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Generated** — `${COMPONENT}` committed to `${{ inputs.branch }}`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Lines |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            TSX="src/components/${COMPONENT}/${COMPONENT}.tsx"
            TEST="src/components/${COMPONENT}/${COMPONENT}.test.tsx"
            [ -f "$TSX" ] && echo "| `$TSX` | $(wc -l < $TSX) |" >> $GITHUB_STEP_SUMMARY
            [ -f "$TEST" ] && echo "| `$TEST` | $(wc -l < $TEST) |" >> $GITHUB_STEP_SUMMARY
          fi
