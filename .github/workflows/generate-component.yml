name: Generate Component (On-Demand)
on:
  workflow_dispatch:
    inputs:
      component_name:
        description: 'Component name in PascalCase'
        required: true
        type: string
      description:
        description: 'Brief description of what this component does'
        required: false
        type: string
      branch:
        description: 'Branch to commit generated component to'
        required: false
        default: 'main'
        type: string
      run_tests:
        description: 'Run tests immediately after generating?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    name: Generate Component
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate placeholder
        run: echo "Generating ${{ inputs.component_name }}"
