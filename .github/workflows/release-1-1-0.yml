name: Release v1.1.0
on:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Bump version to 1.1.0
        run: npm version 1.1.0 --no-git-tag-version
      - name: Prepend CHANGELOG entry
        run: |
          NEW=$(echo "" | base64 -d)
          OLD=$(cat CHANGELOG.md 2>/dev/null || echo "# Changelog")
          printf '%s\n\n%s\n' "$NEW" "$OLD" > CHANGELOG.md
      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v1.1.0"
          git tag v1.1.0
          git push origin main
          git push origin v1.1.0
