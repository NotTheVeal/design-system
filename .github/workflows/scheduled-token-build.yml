name: Token Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
  repository_dispatch:
    types: [token-push]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install style-dictionary
        run: npm install style-dictionary@3 --legacy-peer-deps

      - name: Build design tokens
        run: npm run build:tokens

      - name: Commit generated token artifacts
        run: |
          git config user.name "github-actions[bot]"          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ src/stles/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No token artifacts changed — nothing to commit"
          else
            git commit -m "chore: rebuild token artifacts [skip ci]"
            git push
          fi
