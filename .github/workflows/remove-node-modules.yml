name: Remove node_modules from git tracking

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Remove node_modules from git tracking
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          if git ls-files node_modules | grep -q .; then
            git rm -r --cached node_modules
            git commit -m "chore: remove node_modules from git tracking [skip ci]"
            git push origin main
            echo "Done: node_modules removed from git tracking"
          else
            echo "node_modules is already untracked - nothing to do"
          fi
