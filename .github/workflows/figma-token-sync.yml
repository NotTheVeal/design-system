name: Figma Token Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  FIGMA_FILE_KEY: pyZ5wKN9KGBUfgi47UwQ0q

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate FIGMA_TOKEN secret
        run: |
          if [ -z "${{ secrets.FIGMA_TOKEN }}" ]; then
            echo "::error::FIGMA_TOKEN secret is not set. Add it at Settings > Secrets > Actions."
            exit 1
          fi
          echo "FIGMA_TOKEN is present."

      - name: Fetch Figma design variables
        run: |
          mkdir -p tokens/figma
          HTTP_STATUS=$(curl -s -o tokens/figma/variables.json -w "%{http_code}" \
            -H "X-Figma-Token: ${{ secrets.FIGMA_TOKEN }}" \
            "https://api.figma.com/v1/files/${{ env.FIGMA_FILE_KEY }}/variables/local")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Figma API returned HTTP $HTTP_STATUS"
            cat tokens/figma/variables.json
            exit 1
          fi
          echo "Fetch OK. Size: $(wc -c < tokens/figma/variables.json) bytes"

      - name: Commit updated tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/
          git diff --cached --quiet && echo "No token changes to commit" || git commit -m "chore: sync Figma design tokens"
          git push
