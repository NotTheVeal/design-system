name: Figma Token Sync
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tokens/**'

env:
  FIGMA_FILE_KEY: pyZ5wKN9KGBUfgi47UwQ0q

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build design tokens
        run: |
          if [ -f "package.json" ] && grep -q '"build:tokens"' package.json; then
            npm run build:tokens
          elif [ -f "style-dictionary.config.js" ] || [ -f "config.json" ]; then
            npx style-dictionary build
          else
            echo "No token build script found — tokens are raw JSON, skipping build step."
          fi

      - name: Commit built tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ build/ tokens/ 2>/dev/null || true
          git diff --cached --quiet && echo "No built token changes to commit" || git commit -m "chore: rebuild design tokens from Token Studio sync"
          git push
