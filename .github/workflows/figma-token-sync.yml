# DEPRECATED — replaced by scheduled-token-build.yml
# This workflow duplicated the push trigger on tokens/**. All token build logic
# is now consolidated in scheduled-token-build.yml which also handles:
#   - push to tokens/** (immediate trigger on Token Studio push)
#   - repository_dispatch type: token-push (Token Studio GitHub App webhook)
#   - daily cron at 06:00 UTC (safety net)
#   - workflow_dispatch (manual trigger)
#
# Token Studio setup (one-time, done in Figma plugin settings):
#   1. In Figma, open Token Studio plugin → Settings → Sync → GitHub
#   2. Repository: NotTheVeal/design-system
#   3. Branch: main
#   4. Token path: tokens/
#   5. Secret: a GitHub PAT with repo write scope
#      (store as TOKENS_STUDIO_PAT secret in GitHub repo settings for reference)

name: Figma Token Sync (Deprecated)

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "This workflow is deprecated."
          echo "Token sync is handled by scheduled-token-build.yml"
          echo "Use Token Studio plugin to push tokens to GitHub."
