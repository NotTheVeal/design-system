name: Generate Component (Template)
on:
  workflow_dispatch:
    inputs:
      component_name:
        description: 'PascalCase component name'
        required: true
        type: string
      component_type:
        description: 'Component category'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - form
          - feedback
          - navigation
          - overlay
          - display
      force:
        description: 'Overwrite if component already exists'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate from template
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --prefer-offline || npm install --legacy-peer-deps
      - name: Generate component
        run: node scripts/generate-component-template.js "${{ inputs.component_name }}" "${{ inputs.component_type }}" "${{ inputs.force }}"
      - name: Commit generated component
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: generate ${{ inputs.component_name }} [skip ci]"
          git push