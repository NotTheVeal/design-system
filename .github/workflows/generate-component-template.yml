# Phase 9 Workaround: Template-based scaffolding (no API key required)
# When ANTHROPIC_API_KEY is available, use generate-component.yml instead for AI generation

name: Generate Component (Template)

on:
  workflow_dispatch:
    inputs:
      component_name:
        description: 'PascalCase component name (e.g. FilterChip, PriceInput, ConfirmModal)'
        required: true
        type: string
      component_type:
        description: 'Component category (auto = detect from name)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - form
          - feedback
          - navigation
          - overlay
          - display
      force:
        description: 'Overwrite existing component files'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  scaffold:
    name: Template Scaffold â ${{ github.event.inputs.component_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scaffold component from template
        run: |
          COMPONENT="${{ github.event.inputs.component_name }}"
          TYPE="${{ github.event.inputs.component_type }}"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node scripts/generate-component-template.js "$COMPONENT" --type "$TYPE" $FORCE_FLAG

      - name: Commit scaffolded files
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMPONENT="${{ github.event.inputs.component_name }}"
          COMPONENT_LOWER=$(echo "$COMPONENT" | tr '[:upper:]' '[:lower:]')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH="scaffold/component-${COMPONENT_LOWER}-${TIMESTAMP}"

          git checkout -b "$BRANCH"
          git add src/components/

          if git diff --cached --quiet; then
            echo "No new files were generated (component may already exist; use force=true to overwrite)."
            echo "BRANCH=" >> $GITHUB_ENV
            exit 0
          fi

          git commit -m "feat: scaffold ${COMPONENT} component

          Template-generated by generate-component-template.js (Phase 9 workaround).
          No API key required â uses hardcoded PS Design System 2.0 spec values.
          Triggered by: ${{ github.actor }}
          Component type: ${{ github.event.inputs.component_type }}"

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request
        if: env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMPONENT="${{ github.event.inputs.component_name }}"
          COMPONENT_LOWER=$(echo "$COMPONENT" | tr '[:upper:]' '[:lower:]')

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat: scaffold ${COMPONENT} component" \
            --body "## Template-Scaffolded Component: \`${COMPONENT}\`

          > **Phase 9 Workaround** â This PR was generated by [\`generate-component-template.js\`](../blob/main/scripts/generate-component-template.js) without requiring an \`ANTHROPIC_API_KEY\`. When the key is available, regenerate using the [Generate Component (AI)](../.github/workflows/generate-component.yml) workflow for richer, AI-enhanced output.

          ### Files generated
          | File | Purpose |
          |---|---|
          | \`src/components/${COMPONENT_LOWER}/${COMPONENT}.tsx\` | React component (spec-compliant inline styles) |
          | \`src/components/${COMPONENT_LOWER}/${COMPONENT}.css\` | CSS placeholder (styles are inline per PS convention) |
          | \`src/components/${COMPONENT_LOWER}/${COMPONENT}.test.tsx\` | Vitest + RTL + jest-axe unit tests |
          | \`src/components/${COMPONENT_LOWER}/${COMPONENT}.stories.tsx\` | Storybook 8 stories (autodocs, all variants) |
          | \`src/components/${COMPONENT_LOWER}/index.ts\` | Barrel export |
          | \`src/components/${COMPONENT_LOWER}/tokens.json\` | Token Studio component token snapshot |

          ### PS Design System 2.0 spec values applied
          - **Font**: \`'Source Sans 3', -apple-system, sans-serif\`
          - **Primary**: \`#005BA6\` / Hover: \`#004A84\` / Midnight: \`#002F48\`
          - **Border**: \`#DCDCDC\` / Text: \`#4A4A4A\` / Muted: \`#777777\`
          - **Success**: \`#17AB78\` / Danger: \`#FF0000\` / Warning: \`#E3A92D\`
          - **Shadows**: \`rgba(0,47,72,â¦)\`
          - **Icon strokeWidth**: \`1.75\` (all Lucide icons)
          - **Border radius**: \`4px\`
          - **Styles**: inline (no CSS-in-JS, no Tailwind)

          ### Review checklist
          - [ ] Component structure matches Figma design
          - [ ] All interactive states present (default, hover, focus, active, disabled)
          - [ ] Accessibility: ARIA attributes, keyboard navigation, focus ring visible
          - [ ] Icon strokeWidth is \`1.75\` on all Lucide icons
          - [ ] No hardcoded colors outside the \`COLORS\` constant block
          - [ ] Tests pass: \`npm test -- --testPathPattern=${COMPONENT_LOWER}\`
          - [ ] Storybook stories render without errors: \`npm run storybook\`
          - [ ] Token snapshot in \`tokens.json\` is accurate for this component
          - [ ] \`src/components/index.ts\` barrel export is updated

          Triggered by: @${{ github.actor }}"
