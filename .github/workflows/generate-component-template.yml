name: Generate Component (Template)
on:
  workflow_dispatch:
    inputs:
      component_name:
        description: 'PascalCase component name (e.g. FilterChip)'
        required: true
        type: string
      component_type:
        description: 'Component type: ui, data, layout, feedback'
        required: false
        default: 'ui'
        type: string
      force:
        description: 'Force overwrite existing component'
        required: false
        default: 'false'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --force
        env:
          npm_config_legacy_peer_deps: 'true'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --force --no-save
        env:
          npm_config_legacy_peer_deps: 'true'

      - name: Generate component with Claude
        run: node scripts/generate-component.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPONENT_NAME: ${{ inputs.component_name }}
          COMPONENT_TYPE: ${{ inputs.component_type }}
          FORCE_OVERWRITE: ${{ inputs.force }}

      - name: Commit generated component
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/${{ inputs.component_name }} || true
          git diff --staged --quiet || git commit -m "feat(${{ inputs.component_name }}): generate component via Claude API [skip ci]"
          git push || true

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "Generated component ${{ inputs.component_name }} via Claude API"}
