name: Build Design Tokens

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'style-dictionary.config.js'
      - 'validate-references.js'
  pull_request:
    branches: [main]
    paths:
      - 'tokens/**'


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Validate token references
        run: npm run validate

      - name: Build tokens
        run: npm run build

      - name: Upload built tokens
        uses: actions/upload-artifact@v4
        with:
          name: built-tokens
          path: src/tokens/
          retention-days: 30

  notify:
    name: Notify on failure
    needs: [build]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Slack alert
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *${{ github.workflow }}* failed on `${{ github.ref_name }}`",
              "attachments": [{"color": "danger", "fields": [
                {"title": "Repo", "value": "${{ github.repository }}", "short": true},
                {"title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>", "short": true}
              ]}]
            }
