name: Fix Cart Stories v2
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Write fixed Cart.stories.tsx
        run: echo "" | base64 -d > src/components/cart/Cart.stories.tsx
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/cart/Cart.stories.tsx
          git diff --staged --quiet || git commit -m "fix: update Cart.stories.tsx to match new CartItem interface"
          git push
