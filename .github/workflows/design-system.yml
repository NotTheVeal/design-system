name: Design System Pipeline
on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component name to generate'
        required: false
        type: string
      skip_tests:
        description: 'Skip test jobs'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    name: Validate Workflow Dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pipeline placeholder
        run: echo "Design System Pipeline triggered via ${{ github.event_name }}"
