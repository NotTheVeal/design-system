name: Design System Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:

  validate-tokens:
    name: "1 · Validate Token Structure"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Validate token JSON syntax
        run: |
          find tokens/ -name "*.json" ! -name '\$metadata.json' | while read file; do
            node -e "try { JSON.parse(require('fs').readFileSync('$file','utf8')); console.log('OK: $file') } catch(e) { console.error('FAIL: $file', e.message); process.exit(1) }"
          done
      - name: Check for broken references
        run: node scripts/validate-references.js

  transform-tokens:
    name: "2 · Transform Tokens → CSS / Tailwind / TypeScript"
    needs: validate-tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Flatten Token Studio references
        run: |
          npx token-transformer tokens/ps-tokens tokens/transformed.json             "global/colors,global/typography,global/spacing,global/border-radius,global/shadows,global/motion,semantic/colors,semantic/typography,semantic/spacing,semantic/border-radius,semantic/shadows,components/button,components/badge,components/alert,components/card,components/input,components/checkbox,components/modal,components/toast,components/table,components/navigation,components/pagination,components/tooltip,components/tag,components/avatar,components/progress,components/toggle,components/accordion"             "global/colors"
      - name: Run Style Dictionary
        run: npx style-dictionary build --config style-dictionary.config.js
      - name: Upload token artifacts
        uses: actions/upload-artifact@v4
        with:
          name: design-tokens
          path: |
            src/tokens/
            tokens/transformed.json
          retention-days: 7

  generate-components:
    name: "3 · Claude — Generate / Update Components"
    needs: transform-tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Download token artifacts
        uses: actions/download-artifact@v4
        with: { name: design-tokens }
      - name: Detect changed component tokens
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'tokens/**' | grep -oP '(?<=components/)[^/]+(?=\.json)' | sort -u || true)
          echo "components=$(echo $CHANGED | tr '\n' ' ')" >> $GITHUB_OUTPUT
          if [ -z "$CHANGED" ]; then
            echo "No component tokens changed — skipping generation."
          else
            echo "Changed: $CHANGED"
          fi
      - name: Generate components from tokens
        if: steps.changed.outputs.components != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for component in ${{ steps.changed.outputs.components }}; do
            echo "Generating: $component"
            node scripts/generate-component.js "$component"
            sleep 15
          done
      - name: TypeScript check
        if: always()
        run: |
          if [ -d src/components ] && [ "$(ls src/components/ 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "## TypeScript Check" >> $GITHUB_STEP_SUMMARY
            npx tsc --noEmit 2>&1 | tee /tmp/ts-errors.txt || true
            ERROR_COUNT=$(grep -c "error TS" /tmp/ts-errors.txt 2>/dev/null || echo "0")
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "⚠️ Found ${ERROR_COUNT} TypeScript error(s)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No TypeScript errors" >> $GITHUB_STEP_SUMMARY
            fi
          fi
      - name: Commit generated components
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add src/components/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new components to commit"
          else
            git commit -m "feat: auto-generate components [skip ci]"
            git checkout -- . 2>/dev/null || true
            git pull --rebase origin main
            git push
          fi

  lint-and-test:
    name: "4 · Lint, Unit Tests & Accessibility"
    needs: generate-components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: ESLint
        run: |
          echo "## ESLint" >> $GITHUB_STEP_SUMMARY
          npx eslint src/ --ext .ts,.tsx --format compact 2>&1 | tee /tmp/eslint.txt || true
          if grep -q " error " /tmp/eslint.txt; then
            echo "❌ ESLint errors found" >> $GITHUB_STEP_SUMMARY
            cat /tmp/eslint.txt >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No ESLint errors" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Jest unit tests
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          npx jest --passWithNoTests --reporters=default --reporters=jest-junit 2>&1 | tee /tmp/jest.txt || true
          if grep -q "FAIL" /tmp/jest.txt; then
            echo "❌ Jest tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All Jest tests passed" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          JEST_JUNIT_OUTPUT_DIR: /tmp/reports
          JEST_JUNIT_OUTPUT_NAME: jest-results.xml
      - name: Axe accessibility tests
        run: |
          echo "## Accessibility (Axe)" >> $GITHUB_STEP_SUMMARY
          npx jest --testPathPattern="axe|a11y|accessibility" --passWithNoTests 2>&1 | tee /tmp/axe.txt || true
          if grep -q "FAIL" /tmp/axe.txt; then
            echo "❌ Accessibility violations found" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No accessibility violations" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: /tmp/reports/
          retention-days: 14

  build-storybook:
    name: "5 · Build & Deploy Storybook (Chromatic)"
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build Storybook
        run: |
          echo "## Storybook Build" >> $GITHUB_STEP_SUMMARY
          npx storybook build --output-dir storybook-static 2>&1 | tee /tmp/sb.txt
          if [ $? -eq 0 ]; then
            echo "✅ Storybook built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Storybook build failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      - name: Publish to Chromatic (visual regression)
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          autoAcceptChanges: false
          exitZeroOnChanges: true
          onlyChanged: true
        env:
          CHROMATIC_RETRIES: 2

  notify:
    name: "6 · Pipeline Summary"
    needs: [validate-tokens, transform-tokens, generate-components, lint-and-test, build-storybook]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report pipeline status
        run: |
          echo "## PartsSource Design System Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Tokens | ${{ needs.validate-tokens.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Transform Tokens | ${{ needs.transform-tokens.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Generate Components | ${{ needs.generate-components.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Tests | ${{ needs.lint-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook / Chromatic | ${{ needs.build-storybook.result }} |" >> $GITHUB_STEP_SUMMARY
          FAILED=$(echo "${{ needs.validate-tokens.result }} ${{ needs.transform-tokens.result }} ${{ needs.generate-components.result }} ${{ needs.lint-and-test.result }} ${{ needs.build-storybook.result }}" | grep -c failure || echo 0)
          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Pipeline completed with $FAILED failure(s). Review the logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Full pipeline passed!" >> $GITHUB_STEP_SUMMARY
          fi
