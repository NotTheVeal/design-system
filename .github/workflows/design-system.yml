name: Design System Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'src/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.storybook/**'
      - '.github/workflows/design-system.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: 'Component name to generate. Leave blank to auto-detect.'
        required: false
        type: string
      skip_tests:
        description: 'Skip test jobs (debugging only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: read

env:
  NODE_VERSION: '24'

jobs:
  # ─── JOB 1: Validate Tokens ────────────────────────────────────────────────
  validate-tokens:
    name: Validate Token Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Validate token references
        run: npm run validate

  # ─── JOB 2: Lint & Test Components ─────────────────────────────────────────
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    needs: validate-tokens
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test

  # ─── JOB 3: Build Storybook ────────────────────────────────────────────────
  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: validate-tokens
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1

  # ─── JOB 4: E2E UX Workflow Tests ──────────────────────────────────────────
  e2e-tests:
    name: E2E UX Workflow Tests
    runs-on: ubuntu-latest
    needs: validate-tokens
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Storybook for E2E
        run: npm run build-storybook

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
