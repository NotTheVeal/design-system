name: Design System Pipeline


on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'src/**'
      - '.github/workflows/design-system.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: 'Component name to generate (e.g. Button, Modal, Badge). Leave blank to auto-detect from token changes.'
        required: false
        type: string
      skip_tests:
        description: 'Skip test jobs (use for debugging only)'
        required: false
        type: boolean
        default: false


permissions:
  contents: write
  issues: write
  pull-requests: read


env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  # ─── JOB 1: Validate Tokens ─────────────────────────────────────────────────────────────────────────────
  validate-tokens:
    name: Validate Token Files
    runs-on: ubuntu-latest
