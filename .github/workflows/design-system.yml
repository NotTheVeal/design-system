name: Design System Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  # ─── Job 1: Validate Tokens ───────────────────────────────────────────────
  validate-tokens:
    name: Validate Token Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Validate token JSON syntax
        run: |
          find tokens/ -name "*.json" ! -name '$metadata.json' | while read file; do
            node -e "
              const fs = require('fs');
              try { JSON.parse(fs.readFileSync('$file','utf8')); console.log('OK:', '$file'); }
              catch(e) { console.error('INVALID:', '$file', e.message); process.exit(1); }
            "
          done
      - name: Check for broken references
        run: node scripts/validate-references.js

  # ─── Job 2: Transform Tokens ─────────────────────────────────────────────
  transform-tokens:
    name: Transform Tokens → CSS/Tailwind/TypeScript
    runs-on: ubuntu-latest
    needs: validate-tokens
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Flatten Token Studio references
        run: |
          npx token-transformer \
            tokens/ps-tokens \
            tokens/transformed.json \
            "primitive/color,primitive/typography,primitive/spacing,primitive/sizing,primitive/border,primitive/radius,primitive/shadow,primitive/opacity,primitive/motion,primitive/zIndex,primitive/base,primitive/grid,semantic/color,semantic/typography,semantic/spacing,semantic/sizing,semantic/border,semantic/opacity,semantic/motion,semantic/zIndex,component/button,component/navigation,component/navTop,component/navLeft,component/tabs,component/breadcrumb,component/pagination,component/filter,component/search,component/input,component/select,component/checkbox,component/radio,component/toggle,component/slider,component/stepper,component/datePicker,component/fileUpload,component/card,component/listCard,component/productCard,component/aiDataCard,component/table,component/badge,component/status,component/avatar,component/divider,component/skeleton,component/alert,component/toast,component/modal,component/drawer,component/tooltip,component/popover,component/accordion,component/carousel,component/emptyState,component/progressIndicator,component/loading,component/metric,component/pageShell,component/cart,component/icon,component/iconModality,component/iconCustom,component/iconLineArt,component/iconPictogram,component/inlineButton,component/ctaBar,component/aiAgent,component/cms,component/dataVisualization"

      - name: Create output directories
        run: mkdir -p src/tokens

      - name: Run Style Dictionary
        run: npx style-dictionary build --config style-dictionary.config.js

      - name: Upload token artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transformed-tokens
          path: |
            src/tokens/tokens.css
            src/tokens/tailwind-tokens.js
            src/tokens/tokens.ts
          if-no-files-found: warn

  # ─── Job 3: Generate Components (Claude) ─────────────────────────────────
  generate-components:
    name: Claude — Generate Components
    runs-on: ubuntu-latest
    needs: transform-tokens
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Download transformed tokens
        uses: actions/download-artifact@v4
        with:
          name: transformed-tokens
          path: src/tokens/
        continue-on-error: true

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect changed component tokens
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BEFORE="${{ github.event.before }}"
          else
            BEFORE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" HEAD -- 'tokens/ps-tokens/component/*.json' 2>/dev/null \
            | sed 's|tokens/ps-tokens/component/||' \
            | sed 's|\.json||' || echo "")
          echo "components=$(echo $CHANGED | tr '\n' ' ')" >> $GITHUB_OUTPUT
          if [ -z "$CHANGED" ]; then
            echo "No component tokens changed — skipping generation."
          else
            echo "Changed: $CHANGED"
          fi

      - name: Generate components from tokens
        if: steps.changed.outputs.components != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for component in ${{ steps.changed.outputs.components }}; do
            echo "Generating: $component"
            node scripts/generate-component.js "$component"
            sleep 10
          done

      - name: Commit generated components
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add src/components/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new components to commit"
          else
            git commit -m "feat: auto-generate components [skip ci]"
            git push
          fi
