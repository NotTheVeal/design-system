name: Pipeline Orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'src/**'
  workflow_dispatch:
    inputs:
      skip_chromatic:
        description: 'Skip Chromatic visual tests'
        required: false
        default: 'false'
        type: boolean
      skip_tests:
        description: 'Skip unit tests'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-tokens:
    name: Validate Tokens
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate token files
        run: python3 scripts/validate-tokens.py

  build-tokens:
    name: Build Design Tokens
    runs-on: ubuntu-latest
    needs: validate-tokens
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline || npm install
      - name: Build tokens
        run: |
          if [ -f sd.config.js ] || [ -f style-dictionary.config.js ]; then
            npx style-dictionary build
          else
            echo "No Style Dictionary config, skipping token build"
          fi

  lint-typecheck:
    name: Lint and TypeScript
    runs-on: ubuntu-latest
    needs: build-tokens
    if: always() && needs.validate-tokens.result == 'success'
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline || npm install
      - run: npx tsc --noEmit || true
      - run: npx eslint src --ext .ts,.tsx --max-warnings=50 || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: always() && needs.validate-tokens.result == 'success' && github.event.inputs.skip_tests != 'true'
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline || npm install
      - run: npx jest --passWithNoTests --forceExit || true

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always() && needs.validate-tokens.result == 'success'
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline || npm install
      - name: Build Storybook
        run: |
          npx storybook build --output-dir storybook-static 2>&1 || true
          [ -d storybook-static ] && echo "Storybook built" || echo "No output"
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 7

  chromatic:
    name: Chromatic Visual Tests
    runs-on: ubuntu-latest
    needs: build-storybook
    if: always() && needs.validate-tokens.result == 'success' && github.event.inputs.skip_chromatic != 'true'
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline || npm install
      - uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          onlyChanged: true

  audit-report:
    name: Audit Report
    runs-on: ubuntu-latest
    needs: [validate-tokens, build-tokens, lint-typecheck, unit-tests, build-storybook, chromatic]
    if: always()
    outputs:
      result: ${{ job.status }}
    env:
      VALIDATE_RESULT: ${{ needs.validate-tokens.result }}
      BUILD_RESULT: ${{ needs.build-tokens.result }}
      LINT_RESULT: ${{ needs.lint-typecheck.result }}
      TEST_RESULT: ${{ needs.unit-tests.result }}
      STORYBOOK_RESULT: ${{ needs.build-storybook.result }}
      CHROMATIC_RESULT: ${{ needs.chromatic.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate audit report
        run: python3 scripts/generate-audit.py
      - name: Commit audit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/audit/index.html
          git diff --cached --quiet || (git commit -m "chore(audit): update pipeline audit report" && git push)
      - uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: docs/audit/
          retention-days: 90

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate-tokens, build-tokens, lint-typecheck, unit-tests, build-storybook, chromatic, audit-report]
    if: always()
    steps:
      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          VALIDATE: ${{ needs.validate-tokens.result }}
          BUILD: ${{ needs.build-tokens.result }}
          LINT: ${{ needs.lint-typecheck.result }}
          TESTS: ${{ needs.unit-tests.result }}
          STORYBOOK: ${{ needs.build-storybook.result }}
          CHROMATIC: ${{ needs.chromatic.result }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "No TEAMS_WEBHOOK_URL set, skipping"; exit 0
          fi
          OVERALL="PASS"; THEME="17AB78"
          for r in "$VALIDATE" "$BUILD" "$LINT" "$TESTS" "$STORYBOOK"; do
            [ "$r" = "failure" ] && OVERALL="FAIL" && THEME="FF0000" || true
          done
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"@type\":\"MessageCard\",\"@context\":\"https://schema.org/extensions\",\"themeColor\":\"$THEME\",\"summary\":\"Pipeline $OVERALL\",\"sections\":[{\"activityTitle\":\"**Design System Pipeline: $OVERALL**\",\"activitySubtitle\":\"Branch: ${{ github.ref_name }}\",\"facts\":[{\"name\":\"Validate\",\"value\":\"$VALIDATE\"},{\"name\":\"Build\",\"value\":\"$BUILD\"},{\"name\":\"Lint\",\"value\":\"$LINT\"},{\"name\":\"Tests\",\"value\":\"$TESTS\"},{\"name\":\"Storybook\",\"value\":\"$STORYBOOK\"},{\"name\":\"Chromatic\",\"value\":\"$CHROMATIC\"}]}],\"potentialAction\":[{\"@type\":\"OpenUri\",\"name\":\"View Run\",\"targets\":[{\"os\":\"default\",\"uri\":\"$RUN_URL\"}]}]}"
      - name: Pipeline complete
        run: |
          echo "validate=${{ needs.validate-tokens.result }}"
          echo "build=${{ needs.build-tokens.result }}"
          echo "lint=${{ needs.lint-typecheck.result }}"
          echo "tests=${{ needs.unit-tests.result }}"
          echo "storybook=${{ needs.build-storybook.result }}"
          echo "chromatic=${{ needs.chromatic.result }}"
          echo "audit=${{ needs.audit-report.result }}"
