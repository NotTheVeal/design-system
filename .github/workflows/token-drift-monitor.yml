name: Token Drift Monitor

on:
  schedule:
    # Runs at 08:00 UTC on the 1st of every month
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — report issues without failing'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  token-drift:
    name: Token Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Detect token drift
        id: drift
        run: |
          echo "=== Token Drift Report ===" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Validate token references
          if npm run validate 2>&1 | tee /tmp/validate_out.txt; then
            echo "✅ All token references are valid." >> $GITHUB_STEP_SUMMARY
            DRIFT_COUNT=0
          else
            DRIFT_COUNT=$(grep -c "Error\|error\|FAIL" /tmp/validate_out.txt || true)
            echo "⚠️ Token validation issues found: $DRIFT_COUNT" >> $GITHUB_STEP_SUMMARY
            cat /tmp/validate_out.txt >> $GITHUB_STEP_SUMMARY
          fi

          # Check for tokens modified in last 30 days
          CHANGED=$(git log --since="30 days ago" --name-only --pretty=format: -- tokens/ | sort -u | grep -v '^$' || true)
          if [ -n "$CHANGED" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Token files changed in last 30 days:" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
            echo "$CHANGED" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No token files changed in last 30 days." >> $GITHUB_STEP_SUMMARY
          fi

          echo "drift_count=$DRIFT_COUNT" >> $GITHUB_OUTPUT

      - name: Fail on drift (unless dry run)
        if: ${{ steps.drift.outputs.drift_count != '0' && inputs.dry_run != 'true' }}
        run: |
          echo "Token drift detected. Run with dry_run=true to report without failing."
          exit 1
