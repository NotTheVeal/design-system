name: Generate Color-Scheme Components

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run gen_components.py
        run: python3 scripts/gen_components.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/
          git diff --staged --quiet || git commit -m "feat: generate colorScheme current/future variants for 8 components"
          git push
