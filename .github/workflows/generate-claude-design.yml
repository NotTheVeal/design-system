name: Generate Claude Design Reference

on:
  push:
    branches:
      - main
    paths:
      - 'src/components/**/*.stories.tsx'
      - 'src/components/**/*.stories.ts'
      - 'scripts/generate-claude-design.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Regenerate Claude Design Reference
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Claude Design reference
        run: node scripts/generate-claude-design.js

      - name: Commit updated reference
        run: |
          git add docs/claude-design-reference.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git commit -m "docs: update Claude Design reference [automated]"
            git push
          fi

      - name: Summary
        continue-on-error: true
        run: |
          echo "## Claude Design Reference Updated" >> $GITHUB_STEP_SUMMARY
          echo "Storybook: https://nottheveal.github.io/design-system/" >> $GITHUB_STEP_SUMMARY
