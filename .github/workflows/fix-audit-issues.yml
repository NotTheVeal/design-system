name: Fix Audit Issues - Apply all Storybook/Figma fixes
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-audit-issues.yml']
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply all audit fixes
        run: echo 'ﾃ却' | base64 -d | python3
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: apply audit fixes - colorScheme future, orange to blue, sizing"
          git push
      - name: Set FIGMA_FILE_KEY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set FIGMA_FILE_KEY --body "pyZ5wKN9KGBUfgi47UwQ0q" -R NotTheVeal/design-system || true
          echo "FIGMA_FILE_KEY set."
