name: Bootstrap generate-component script

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write scripts/generate-component.js
        run: |
          mkdir -p scripts
          printf '' | base64 -d > scripts/generate-component.js
          echo "Written $(wc -c < scripts/generate-component.js) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/generate-component.js
          git diff --cached --quiet || git commit -m "feat: add scripts/generate-component.js (Claude API auto-caller)"
          git push
