name: Patch Token Pipeline
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix git add command
        run: |
          sed -i 's/git add dist\/ src\/styles\/ --ignore-unmatch/git add dist\/ src\/styles\/ 2>\/dev\/null || true/g' .github/workflows/scheduled-token-build.yml
          cat .github/workflows/scheduled-token-build.yml | grep "git add"
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/scheduled-token-build.yml
          git diff --staged --quiet && echo "Already fixed" || (git commit -m "fix: correct git add in token pipeline [skip ci]" && git push)
