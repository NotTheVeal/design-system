name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx vite build --config vite.lib.config.ts

      - name: Generate type declarations
        run: npx tsc --declaration --emitDeclarationOnly --outDir dist --project tsconfig.build.json || true

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    needs: publish
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## @partssource/react-ui-core ${{ github.ref_name }}

            Install with:
            ```bash
            npm install @partssource/react-ui-core@${{ github.ref_name }}
            ```

            View the full changelog and docs at the [Storybook](https://partssourceinc.github.io/react-ui-core).
